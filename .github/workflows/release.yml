name: Release

on:
  # Publishing happens ONLY when a GitHub Release is published. A bare v* tag
  # push does not release — you must cut a Release. The `guard` job below further
  # enforces the tag is `v*` and its commit lives on `main`.
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Verify v* tag on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag must be v* and its commit must be on main
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          echo "Release tag: $TAG  commit: $GITHUB_SHA"
          case "$TAG" in
            v*) ;;
            *) echo "::error::Release tag '$TAG' is not a v* tag — refusing to publish."; exit 1 ;;
          esac
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "OK: commit $GITHUB_SHA is contained in main."
          else
            echo "::error::Release commit $GITHUB_SHA is not on main — refusing to publish."
            exit 1
          fi

  build:
    name: Build artifacts
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-conda:
    name: Build conda package (noarch)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | PIXI_VERSION=v0.70.0 bash
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Build noarch conda package
        # `pixi publish --target-dir` builds the package and copies the artifact
        # locally (no channel auth). conda-forge distribution itself is handled by
        # the feedstock (see conda-recipe/README.md); this job builds + verifies
        # and attaches the artifact to the GitHub Release.
        run: pixi publish --target-dir ./conda-dist

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-noarch
          path: conda-dist/**/*.conda

      - name: Attach conda package to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: conda-dist/**/*.conda

  verify:
    name: Verify artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install built wheel (no deps)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-deps dist/*.whl

      - name: Import smoke check
        run: python -c "import pyvae; print('pyvae import ok')"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
