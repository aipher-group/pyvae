name: Release

on:
  # Publishing happens ONLY when a GitHub Release is published. A bare v* tag
  # push does not release — you must cut a Release. The `guard` job below further
  # enforces the tag is `v*` and its commit lives on `main`.
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: Verify v* tag on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag must be v* and its commit must be on main
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          echo "Release tag: $TAG  commit: $GITHUB_SHA"
          case "$TAG" in
            v*) ;;
            *) echo "::error::Release tag '$TAG' is not a v* tag — refusing to publish."; exit 1 ;;
          esac
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "OK: commit $GITHUB_SHA is contained in main."
          else
            echo "::error::Release commit $GITHUB_SHA is not on main — refusing to publish."
            exit 1
          fi

  build:
    name: Build sdist + wheel
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: publish      # lean python-build + twine env
          frozen: true
          cache: true
      # build-dist (python -m build) + check-dist (twine check) — same as local.
      - run: pixi run -e publish check-dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-conda:
    name: Build conda package (noarch)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          run-install: false         # only the pixi binary is needed for `pixi publish`
      # Builds the noarch package and copies it locally (no channel auth).
      # conda-forge distribution is handled by the feedstock (see conda-recipe/);
      # here we build + attach the artifact to the GitHub Release.
      - run: pixi publish --target-dir ./conda-dist
      - uses: actions/upload-artifact@v4
        with:
          name: conda-noarch
          path: conda-dist/**/*.conda
      - name: Attach conda package to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: conda-dist/**/*.conda

  verify:
    name: Verify wheel installs + imports
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Deliberately vanilla: confirm the published wheel installs and imports
      # the way an end user's `pip install pyvae` would (not via a pixi env).
      - run: |
          python -m pip install --upgrade pip
          python -m pip install --no-deps dist/*.whl
          python -c "import pyvae; print('pyvae import ok')"

  publish-pypi:
    name: Publish to PyPI
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # Trusted Publishing (OIDC) — no API token in CI. This stays the pypa
      # action rather than `pixi run -e publish publish-pypi` (twine) precisely
      # because twine upload would require a stored PyPI token.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
