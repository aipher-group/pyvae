name: CI

# Run on develop pushes, and on PRs targeting develop or main (release PRs).
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Target platforms: linux-64 and osx-arm64 (Apple Silicon).
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: ci      # lean cpu + dev env from pyproject.toml
          cache: true
      - run: pixi run -e ci pytest tests/ -v

  gpu-smoke:
    # No GPU on hosted runners: this only checks the cuda12 / rocm72 environments
    # still resolve/install and that pyvae imports under that torch build.
    # Best-effort: a flaky GPU-env solve must not block develop.
    name: GPU env smoke (${{ matrix.env }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        env: [cuda12, rocm72]
    env:
      # Let the cuda12 env (system-requirements cuda=12) solve without a GPU.
      CONDA_OVERRIDE_CUDA: "12"
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: ${{ matrix.env }}
          cache: true
      - run: pixi run -e ${{ matrix.env }} python -c "import torch, pyvae; print('torch', torch.__version__, '| pyvae import ok')"
