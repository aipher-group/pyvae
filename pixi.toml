[workspace]
name = "Informed-iVAE"
version = "0.0.1"
authors = ["Amir Aynede <amiraynede@gmail.com>", "Carlos Loucera <clou@us.es>"]
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
isgpu = "python -c 'import torch; print(\"CUDA available:\", torch.cuda.is_available())'"
fixcode = "ruff check --extend-select I --fix pyvae"
formatcode = "ruff format pyvae"

[dependencies]
python = "3.13.*"
pip = "*"
scanpy = ">=1.11.5,<2"
scipy = ">=1.10,<2"
numpy = ">=1.26.4,<3"
pandas = ">=2.3.3,<3"
scikit-learn = ">=1.7.2,<2"
seaborn = ">=0.13.2,<0.14"
matplotlib = ">=3.10.9,<4"
tqdm = ">=4.66,<5"
leidenalg = ">=0.10,<1"
python-igraph = ">=0.11.9,<2"
scikit-misc = ">=0.3.0"  
graphviz = ">=7.1.0,<7.2"
pydot = ">=3.0.1,<3.1"
python-dotenv = ">=1.2.2,<2"
ruff = ">=0.6.2,<1"
ipykernel = "*"
anndata = ">=0.11.4,<0.12"
statsmodels = ">=0.14.6,<0.15"
pynndescent = ">=0.5.13,<0.6"
ipywidgets = ">=8.1.8,<9"
nbconvert = ">=7.17.1,<8"
nbformat = ">=5.10.4,<6"
nbclient = ">=0.11.0,<0.12"
jupyterlab = ">=4.5.8,<5"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
pyvae = { path = ".", editable = true }

[feature.cpu.dependencies]
pytorch = ">=2.3.0,<3"

[feature.cuda12.dependencies]
pytorch = ">=2.3.0,<3"

[feature.cuda12.target.linux-64.dependencies]
pytorch-cuda = "12.*"

[feature.cuda12.system-requirements]
cuda = "12"

[feature.rocm72.target.linux-64.activation.env]
PIP_EXTRA_INDEX_URL = "https://download.pytorch.org/whl/rocm7.2"

[feature.rocm72]
platforms = ["linux-64"]

[feature.rocm72.target.linux-64.dependencies]
python = ">=3.11,<3.14"
pip = "*"

[feature.rocm72.target.linux-64.pypi-dependencies]
torch = ">=2.7,<2.8"
torchvision = ">=0.22,<0.23"
torchaudio = ">=2.7,<2.8"

[environments]
default = { features = ["cpu"], solve-group = "torch" }
cuda12 = { features = ["cuda12"], solve-group = "torch" }
rocm72 = { features = ["rocm72"], no-default-feature = true, solve-group = "rocm" }
